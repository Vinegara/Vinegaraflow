services:
  postgres:
    image: postgres:16-alpine
    container_name: vinegaraflow-postgres
    environment:
      POSTGRES_DB: vinegaradb
      POSTGRES_USER: vinegara
      POSTGRES_PASSWORD: "0000"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vinegara -d vinegaradb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
