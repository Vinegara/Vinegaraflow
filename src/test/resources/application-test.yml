spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  liquibase:
    enabled: false
  security:
    jwt:
      secret: testSecretKeyForUnitTestsOnlyDontUseInProduction1234567890
      expiration: 86400000

logging:
  level:
    org.springframework: ERROR
    vinegaraflow: DEBUG